<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Mohammad 💚</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f9d58,#14532d);
    color:white;
    text-align:center;
}

/* كلمة السر */
#login {
    margin-top:20%;
}

/* popup 1 */
#popup1, #popup2, #overlay {
    display:none;
    position:fixed;
}

#overlay {
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    top:0;
    left:0;
}

.popup {
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    color:black;
    padding:20px;
    border-radius:15px;
    width:320px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* ايموجي */
#letter {
    font-size:60px;
    cursor:pointer;
    display:none;
}

/* زر الموسيقى */
#musicBtn {
    position:fixed;
    top:20px;
    right:20px;
    width:55px;
    height:55px;
    border-radius:50%;
    font-size:20px;
}

input {
    padding:10px;
    border-radius:8px;
    border:none;
}

button {
    padding:10px 20px;
    border-radius:8px;
    border:none;
    background:white;
    color:green;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- كلمة السر -->
<div id="login">
    <h2>Enter Password 💚</h2>
    <input type="password" id="pass">
    <br><br>
    <button onclick="check()">Unlock</button>
</div>

<!-- الخلفية -->
<div id="overlay"></div>

<!-- popup 1 -->
<div id="popup1" class="popup">
    <p id="typing1"></p>
    <div id="letter" onclick="openMessage()">💌</div>
</div>

<!-- popup 2 -->
<div id="popup2" class="popup">
    <p id="typing2"></p>
    <br>
    <button onclick="closeAll()">Close 💚</button>
</div>

<!-- الموسيقى -->
<iframe id="music" width="0" height="0" allow="autoplay"></iframe>
<button id="musicBtn" onclick="playMusic()">🎵</button>

<script>

/* كلمة السر */
function check(){
    let p = document.getElementById("pass").value;
    if(p==="naed"){
        document.getElementById("login").style.display="none";
        document.getElementById("overlay").style.display="block";
        document.getElementById("popup1").style.display="block";
        typeFirst();
    }else{
        alert("Wrong password");
    }
}

/* النص الاول */
let text1 = `Now it's my turn to tell you,
"I have successfully discovered the password."`;
let i=0;

function typeFirst(){
    if(i<text1.length){
        document.getElementById("typing1").innerHTML += text1.charAt(i);
        i++;
        setTimeout(typeFirst,40);
    }else{
        document.getElementById("letter").style.display="block";
    }
}

/* فتح الرسالة */
let text2 = `I'm so sorry for what I did, and I hope to earn your trust again.
I truly love you. You're a wonderful person, and I don't want anything between us to end or diminish;
on the contrary, I want it to grow. I know you said it's over, but I decided to do this because when you did it,
it gave me a truly wonderful feeling. You really mean a lot to me; you're a big part of my life.`;

let j=0;

function openMessage(){
    document.getElementById("popup1").style.display="none";
    document.getElementById("popup2").style.display="block";
    typeSecond();
    playMusic();
}

function typeSecond(){
    if(j<text2.length){
        document.getElementById("typing2").innerHTML += text2.charAt(j);
        j++;
        setTimeout(typeSecond,40);
    }
}

/* اغلاق */
function closeAll(){
    document.getElementById("popup2").style.display="none";
    document.getElementById("overlay").style.display="none";
}

/* تشغيل الاغنية */
function playMusic(){
    document.getElementById("music").src="https://www.youtube.com/embed/jJPMnTXl63E?autoplay=1";
}

</script>

</body>
</html>
